{% for fb in feedback_on_my_beers %}
<div class="bg-white p-2 rounded-lg text-[10px] flex justify-between items-center gap-2 shadow-sm border border-base-200">
    <div class="leading-tight">
        <a href="{% url 'public_profile' fb.drinker_id.username %}" class="underline font-bold text-primary">{{ fb.drinker_id.username }}</a> a noté 
        <a href="{% url 'beer_detail' fb.beer_id.slug %}" class="font-bold underline">{{ fb.beer_id.name }}</a>
    </div>
    <span class="badge badge-warning badge-sm gap-1 font-bold shrink-0">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
        {{ fb.note }}
    </span>
</div>
{% empty %}
<p class="text-[10px] text-gray-500 bg-white p-3 rounded-box shadow-sm text-center">Pas encore d'avis sur vos bières.</p>
{% endfor %}
