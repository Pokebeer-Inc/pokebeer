{% for beer in my_added_beers %}
<div class="flex items-center justify-between bg-white p-3 rounded-lg shadow-sm border border-base-200 hover:bg-base-200 active:scale-[0.98] transition-all gap-3 relative overflow-hidden">
    <a href="{% url 'beer_detail' beer.slug %}" class="absolute inset-0 z-0"></a>
    <div class="flex-1 min-w-0 flex flex-col gap-1 pointer-events-none">
        <div class="flex flex-col">
            <span class="font-bold text-sm leading-tight truncate">{{ beer.name }}</span>
            <a href="{% url 'brewery_detail' beer.brewery_id.id %}" class="text-[10px] text-gray-500 truncate pointer-events-auto relative z-10 hover:text-primary transition-colors inline-block w-fit">
                {{ beer.brewery_id.name }}
            </a>
        </div>
        <div class="flex gap-1 mt-0.5">
            {% if beer.style %}
            <span class="badge badge-secondary badge-outline badge-xs text-[9px]">{{ beer.style }}</span>
            {% endif %}
            <span class="badge badge-neutral badge-outline badge-xs text-[9px]">Alc. {{ beer.degree }}%</span>
        </div>
    </div>
    <div class="shrink-0 flex items-center pointer-events-none relative z-10">
        {% if beer.user_note is not None %}
        <span class="badge badge-warning badge-sm gap-1 font-bold">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
            {{ beer.user_note }}
        </span>
        {% else %}
        <span class="text-[10px] text-gray-400 italic">Non notée</span>
        {% endif %}
    </div>     
</div>
{% empty %}
<p class="text-[10px] text-gray-500 bg-white p-3 rounded-box shadow-sm text-center">Aucun ajout pour l'instant.</p>
{% endfor %}
