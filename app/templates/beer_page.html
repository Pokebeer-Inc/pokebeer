{% extends "base.html" %}

{% block content %}
<div class="flex flex-row">
    <div>
        <h1 class="text-4xl font-castoro font-bold mb-4">{{ beer.name }}</h1>
        <p class="text-gray-600 mb-2">{{ beer.description }}</p>
        <div class="flex items-center gap-4 mt-4">
            <span class="badge badge-primary">Degré : {{ beer.degree }}%</span>
            <span class="badge badge-secondary">Amertume : {{ beer.bitterness }} IBU</span>
        </div> 
    </div>
    <div>
        {{beer.brewery_id.name}}
    </div>
</div>

{% endblock %}
